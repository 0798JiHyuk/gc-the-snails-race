name: CI Build

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: gradle/actions/setup-gradle@v4

      - name: gradlew 실행 권한
        working-directory: ${{ matrix.service }}
        run: chmod +x ./gradlew

      - name: 빌드 실행
        working-directory: ${{ matrix.service }}
        run: ./gradlew build
